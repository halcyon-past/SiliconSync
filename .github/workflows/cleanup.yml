name: Cleanup Old News

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run cleanup
        run: python backend/cleanup.py
      - name: Commit cleanup
        run: |
          git config user.name "halcyon-past"
          git config user.email "titanssuperior@gmail.com"
          git add -A
          git diff --staged --quiet || git commit -m "Cleanup: removed news older than 90 days"
          git push

name: Daily Tech News

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          MEDIASTACK_KEY: ${{ secrets.MEDIASTACK_KEY }}
        run: python backend/publisher.py
      - name: Commit and push
        run: |
          git config user.name "halcyon-past"
          git config user.email "titanssuperior@gmail.com"
          git add frontend/public/
          git status
          git diff --staged --quiet || (git commit -m "Daily news: $(date +'%Y-%m-%d')" && git push -f)
